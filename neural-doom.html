<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEURAL DOOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Russo+One&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060404;
  color: #cc1a1a;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
#wrap {
  display: flex;
  border: 1px solid #cc1a1a33;
  box-shadow: 0 0 60px #cc1a1a18, 0 0 120px #cc1a1a0a;
}
#gameWrap { position: relative; flex-shrink: 0; }
#c { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#gameWrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events: none;
}
#xhair {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 14px; height: 14px;
  pointer-events: none;
}
#xhair::before, #xhair::after {
  content: '';
  position: absolute;
  background: rgba(200,120,120,0.75);
}
#xhair::before { width: 14px; height: 1px; top: 50%; left: 0; transform: translateY(-50%); }
#xhair::after  { width: 1px; height: 14px; top: 0; left: 50%; transform: translateX(-50%); }
#panel {
  width: 240px;
  background: #080404;
  border-left: 1px solid #cc1a1a22;
  padding: 12px 11px 10px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  overflow: hidden;
}
.title {
  font-family: 'Russo One', sans-serif;
  font-size: 24px;
  color: #cc1a1a;
  letter-spacing: 4px;
  text-align: center;
  text-shadow: 0 0 12px #cc1a1a99, 0 0 24px #cc1a1a44;
  line-height: 1;
}
.sub {
  font-size: 10px;
  color: #cc1a1a55;
  letter-spacing: 2px;
  text-align: center;
  margin-top: 3px;
}
hr.dv { border: none; border-top: 1px solid #cc1a1a1a; }
.lbl { font-size: 12px; color: #cc1a1a55; letter-spacing: 3px; margin-bottom: 3px; }
.bar-row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.bar-name { font-size: 12px; color: #cc1a1a77; letter-spacing: 1px; width: 36px; flex-shrink: 0; }
.bar-track { flex: 1; height: 5px; background: #cc1a1a12; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.12s; }
.bar-pl { background: linear-gradient(90deg, #115511, #33ff55); box-shadow: 0 0 5px #33ff5566; }
.bar-en { background: linear-gradient(90deg, #550505, #ff2222); box-shadow: 0 0 5px #ff222266; }
.bar-num { font-size: 14px; color: #cc1a1a88; width: 24px; text-align: right; flex-shrink: 0; }
.stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
.stat-val { font-size: 13px; color: #ff3333; text-shadow: 0 0 8px #ff333355; letter-spacing: 1px; }
#loss-canvas { width: 100%; height: 52px; background: #040202; border: 1px solid #cc1a1a18; display: block; }
.phase-bar { height: 3px; background: #cc1a1a18; border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.phase-fill {
  height: 100%;
  background: linear-gradient(90deg, #661111, #cc1a1a, #ff4444);
  box-shadow: 0 0 5px #cc1a1a;
  transition: width 0.4s;
  border-radius: 2px;
}
.phase-txt { font-size: 12px; color: #cc1a1a88; letter-spacing: 2px; text-align: center; }
.out-grid { display: flex; flex-wrap: wrap; gap: 3px; }
.out-btn {
  font-size: 10px;
  padding: 2px 4px;
  border: 1px solid #cc1a1a22;
  color: #cc1a1a33;
  border-radius: 2px;
  letter-spacing: 0.5px;
  transition: all 0.08s;
  white-space: nowrap;
}
.out-btn.on { color: #ff5555; border-color: #ff555588; background: rgba(255,50,50,0.07); box-shadow: 0 0 5px #ff555533; }
.out-btn.fire-on { color: #ffbb00; border-color: #ffbb0088; background: rgba(255,185,0,0.09); box-shadow: 0 0 8px #ffbb0066; }
.nn-arch {
  background: #030101;
  border: 1px solid #cc1a1a16;
  padding: 6px 8px;
  font-size: 11px;
  color: #cc1a1a44;
  letter-spacing: 0.5px;
  line-height: 1.85;
}
.nn-arch span { color: #cc1a1a88; }
.ctrl {
  font-size: 11px;
  color: #cc1a1a3a;
  line-height: 1.85;
  letter-spacing: 1px;
  margin-top: auto;
  padding-top: 7px;
  border-top: 1px solid #cc1a1a18;
}
.ctrl b { color: #cc1a1a66; }
/* Damage vignette flash */
#dmg-flash {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border: 0px solid rgba(255,0,0,0);
  transition: border-width 0.05s, border-color 0.05s;
}
#dmg-flash.hit {
  border: 18px solid rgba(255,40,0,0.55);
  box-shadow: inset 0 0 40px rgba(255,0,0,0.35);
}
/* Rocket cooldown indicator */
#rcd-bar {
  position: absolute;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  width: 80px; height: 4px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(100,180,255,0.3);
  border-radius: 2px;
  overflow: hidden;
}
#rcd-fill {
  height: 100%;
  background: linear-gradient(90deg, #2266aa, #88ccff);
  box-shadow: 0 0 5px #88ccff88;
  transition: width 0.06s;
}

#game-over-banner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.85);
  font-family: 'Russo One', sans-serif;
  font-size: 48px;
  letter-spacing: 0.5em;
  color: #ff5555;
  text-shadow: 0 0 20px rgba(255, 85, 85, 0.8);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  z-index: 2;
  gap: 12px;
}
#game-over-banner.visible {
  opacity: 1;
  pointer-events: auto;
}

#banner-restart {
  padding: 6px 14px;
  border: 1px solid #cc1a1a;
  border-radius: 3px;
  background: transparent;
  color: #ffdddd;
  font-family: 'Russo One', sans-serif;
  letter-spacing: 0.6em;
  text-transform: uppercase;
  font-size: 10px;
  cursor: pointer;
  transition: background 0.16s ease, color 0.16s ease;
}

#banner-restart:hover {
  background: rgba(204, 26, 26, 0.25);
  color: #fff;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="gameWrap">
    <canvas id="c" width="800" height="600"></canvas>
    <div id="xhair"></div>
    <div id="dmg-flash"></div>
    <div id="rcd-bar"><div id="rcd-fill" style="width:100%"></div></div>
  </div>
  <div id="panel">
    <div>
      <div class="title">NEURAL DOOM</div>
      <div class="sub">ENEMY AI · LIVE BACKPROP</div>
    </div>
    <hr class="dv">
    <div>
      <div class="bar-row">
        <div class="bar-name">PLAYER</div>
        <div class="bar-track"><div class="bar-fill bar-pl" id="hp-pl" style="width:100%"></div></div>
        <div class="bar-num" id="hv-pl">100</div>
      </div>
      <div class="bar-row">
        <div class="bar-name">ENEMY</div>
        <div class="bar-track"><div class="bar-fill bar-en" id="hp-en" style="width:100%"></div></div>
        <div class="bar-num" id="hv-en">100</div>
      </div>
    </div>
    <div class="stat-row">
      <div><div class="lbl">STEPS</div><div class="stat-val" id="s-steps">0</div></div>
      <div><div class="lbl">LOSS</div><div class="stat-val" id="s-loss">-.---</div></div>
      <div><div class="lbl">KILLS</div><div class="stat-val" id="s-kills">0</div></div>
    </div>
    <div>
      <div class="lbl">TRAINING LOSS</div>
      <canvas id="loss-canvas" width="218" height="52"></canvas>
    </div>
    <div>
      <div class="lbl">LEARNING PHASE</div>
      <div class="phase-bar"><div class="phase-fill" id="pf" style="width:0%"></div></div>
      <div class="phase-txt" id="pl-txt">INITIALIZING...</div>
    </div>
    <div>
      <div class="lbl">ACTIVE OUTPUTS</div>
      <div class="out-grid" id="out-grid"></div>
    </div>
    <div class="nn-arch" id="nn-arch-box"></div>
    <div class="ctrl">
      <b>WASD</b> MOVE &nbsp; <b>← →</b> TURN<br>
      <b>SPACE</b> FIRE ROCKET LAUNCHER
    </div>
  </div>
</div>
<div id="game-over-banner">
  <span>GAME OVER</span>
  <button id="banner-restart" type="button">RESTART</button>
</div>
<script src="map.js"></script>
<script src="ai.js"></script>
<script src="graphics.js"></script>
<script src="gameloop.js"></script>

<script>

requestAnimationFrame(frame);

</script>
</body>
</html>
